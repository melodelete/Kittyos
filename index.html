<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KittyOS - A Feline-Inspired Web OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f0e6 0%, #e8d5c4 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Kitty-themed background elements */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.2) 0%, transparent 20%),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.15) 0%, transparent 20%);
            pointer-events: none;
            z-index: -1;
        }

        /* Paw print pattern */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 25% 25%, rgba(200,160,120,0.1) 1px, transparent 1px),
                radial-gradient(circle at 75% 75%, rgba(200,160,120,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -2;
            opacity: 0.3;
        }

        /* Kitty ears decoration */
        .kitty-ears {
            position: fixed;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 80px solid #f5f0e6;
            z-index: 10;
        }

        .kitty-ears::before,
        .kitty-ears::after {
            content: '';
            position: absolute;
            top: -20px;
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 50px solid #f5f0e6;
        }

        .kitty-ears::before {
            left: -20px;
            transform: rotate(-15deg);
        }

        .kitty-ears::after {
            right: -20px;
            transform: rotate(15deg);
        }

        /* Desktop environment */
        .desktop {
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to top, rgba(240,230,210,0.9), rgba(220,210,190,0.9));
            backdrop-filter: blur(10px);
            border-top: 2px solid rgba(200,180,160,0.3);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            z-index: 100;
            border-radius: 20px 20px 0 0;
        }

        .start-button {
            background: linear-gradient(to bottom, #ffd7b5, #ffb36b);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 18px;
            color: #8B4513;
        }

        .start-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .system-tray {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tray-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .tray-item:hover {
            background: rgba(200,180,160,0.2);
            transform: scale(1.1);
        }

        .tray-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .tray-label {
            font-size: 12px;
            color: #8B4513;
            font-weight: 500;
        }

        /* Desktop icons */
        .desktop-icons {
            position: absolute;
            top: 20px;
            left: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 80px);
            gap: 20px;
            max-width: calc(100% - 40px);
        }

        .desktop-icon {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.8);
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .desktop-icon:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            border-color: #ffd7b5;
            background: rgba(255,255,255,0.9);
        }

        .desktop-icon i {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
            color: #8B4513;
        }

        .desktop-icon span {
            font-size: 14px;
            font-weight: 500;
            color: #5D4037;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="kitty-ears"></div>

    <div class="desktop">
        <div class="taskbar">
            <button class="start-button" id="startButton">
                <i class="fas fa-cat"></i>
            </button>

            <div class="system-tray">
                <div class="tray-item" id="timeButton">
                    <div class="tray-icon">
                        <i class="far fa-clock"></i>
                    </div>
                    <div class="tray-label" id="timeDisplay">--:--</div>
                </div>

                <div class="tray-item" id="dateButton">
                    <div class="tray-icon">
                        <i class="far fa-calendar-alt"></i>
                    </div>
                    <div class="tray-label" id="dateDisplay">--/--/----</div>
                </div>

                <div class="tray-item" id="batteryButton">
                    <div class="tray-icon">
                        <i class="fas fa-battery-full"></i>
                    </div>
                    <div class="tray-label" id="batteryDisplay">100%</div>
                </div>

                <div class="tray-item" id="networkButton">
                    <div class="tray-icon">
                        <i class="fas fa-wifi"></i>
                    </div>
                    <div class="tray-label">Online</div>
                </div>
            </div>
        </div>

        <div class="desktop-icons">
            <div class="desktop-icon" id="appMenu">
                <i class="fas fa-paw cat-icon"></i>
                <span>Apps</span>
            </div>

            <div class="desktop-icon" id="iconTerminal">
                <i class="fas fa-terminal cat-icon"></i>
                <span>Terminal</span>
            </div>

            <div class="desktop-icon" id="iconNotes">
                <i class="fas fa-sticky-note cat-icon"></i>
                <span>Notes</span>
            </div>

            <div class="desktop-icon" id="iconGallery">
                <i class="fas fa-images cat-icon"></i>
                <span>Gallery</span>
            </div>

            <div class="desktop-icon" id="iconClock">
                <i class="fas fa-clock cat-icon"></i>
                <span>Clock</span>
            </div>

            <div class="desktop-icon" id="iconBrowser">
                <i class="fas fa-globe cat-icon"></i>
                <span>Browser</span>
            </div>
        </div>
    </div>

    <!-- Start Menu -->
    <div class="start-menu" id="startMenu">
        <div class="start-menu-header">
            <h3><i class="fas fa-cat"></i> KittyOS Menu</h3>
            <button id="closeMenu" class="control-button" style="background: #ffb36b; color: white; width: 25px; height: 25px; font-size: 12px;">×</button>
        </div>
        <div class="start-menu-content">
            <div class="menu-item">
                <div class="menu-item-icon"><i class="fas fa-terminal"></i></div>
                <div class="menu-item-label">Terminal</div>
            </div>
            <div class="menu-item">
                <div class="menu-item-icon"><i class="fas fa-sticky-note"></i></div>
                <div class="menu-item-label">Notes</div>
            </div>
            <div class="menu-item">
                <div class="menu-item-icon"><i class="fas fa-images"></i></div>
                <div class="menu-item-label">Gallery</div>
            </div>
            <div class="menu-item">
                <div class="menu-item-icon"><i class="fas fa-clock"></i></div>
                <div class="menu-item-label">Clock</div>
            </div>
            <div class="menu-item">
                <div class="menu-item-icon"><i class="fas fa-globe"></i></div>
                <div class="menu-item-label">Browser</div>
            </div>
            <div class="menu-item">
                <div class="menu-item-icon"><i class="fas fa-cat"></i></div>
                <div class="menu-item-label">Kitty Facts</div>
            </div>
            <div class="menu-item">
                <div class="menu-item-icon"><i class="fas fa-paw"></i></div>
                <div class="menu-item-label">Paw Gallery</div>
            </div>
        </div>
    </div>
</body>
</html>
